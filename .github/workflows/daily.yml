name: Daily-Agent
on:
  schedule:
    - cron: '0 1 * * *' # 每天北京时间早上 9:00 自动运行
  workflow_dispatch:     # 允许你在 Actions 页面手动点按钮运行

jobs:
  run-it:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests huggingface_hub

      - name: Run script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: python agent_daily.py
